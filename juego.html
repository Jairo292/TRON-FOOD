<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Juego - Kitchen Arena</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link href="juego.css" rel="stylesheet">


</head>
<body>


<div class="hud">
    <div>Vidas:<img src="iconos/vidas.png" class="icono-vida">
    </div>
    <div class="elemento-actual">
  Elemento Actual:
  <img src="iconos/salsa.png" class="icono-elemento">
</div>
   <div class="queue">
  Cola:
  <img src="iconos/limonada.png" class="icono-elemento">
  →
  <img src="iconos/yogurt.png" class="icono-elemento">
  →
  <img src="iconos/algodon.png" class="icono-elemento">
</div>
    <button class="btn btn-outline-light btn-sm btn-custom" data-bs-toggle="modal" data-bs-target="#pausaModal">
        Pausa
    </button>

    
</div>

<div class="area-juego">
    <div class="campo-juego">
        Aquí irá el canvas WebGL
    </div>

</div>

<div class="modal fade" id="pausaModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content text-center p-4">
      <h5 class="modal-title mb-3">Juego en Pausa</h5>
      <div class="d-grid gap-2">
        <button type="button" class="btn btn-success btn-custom" data-bs-dismiss="modal">
            Reanudar
        </button>
        <a href="index.html" class="btn btn-danger btn-custom">
            Salir al Menú
        </a>
        
    <button class="btn btn-outline-success btn-sm btn-custom" data-bs-toggle="modal" data-bs-target="#ganarModal">
  Win
</button>

<button class="btn btn-outline-danger btn-sm btn-custom" data-bs-toggle="modal" data-bs-target="#perderModal">
  Lose
</button>
      </div>
    </div>
  </div>
</div>

<div class="modal fade" id="ganarModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content text-center p-4 modal-win">
      <h5 class="modal-title mb-2">YOU WIN!</h5>
      <p class="mb-3 opacity-75">¡Ganaste la ronda! Cocinaste.</p>

      <div class="d-grid gap-2">
        <button type="button" class="btn btn-success btn-custom" data-bs-dismiss="modal">
          Siguiente Ronda
        </button>
        <a href="index.html" class="btn btn-outline-light btn-custom">
          Volver al Menú
        </a>
      </div>
    </div>
  </div>
</div>

<div class="modal fade" id="perderModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content text-center p-4 modal-lose">
      <h5 class="modal-title mb-2">YOU LOSE!</h5>
      <p class="mb-3 opacity-75">Se quemó la cocina… inténtalo de nuevo.</p>

      <div class="d-grid gap-2">
        <button type="button" class="btn btn-danger btn-custom"  data-bs-dismiss="modal" id="btnReintentar">
          Reintentar
        </button>
        <a href="index.html" class="btn btn-outline-light btn-custom">
          Salir al Menú
        </a>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
