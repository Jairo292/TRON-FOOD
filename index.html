<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kitchen Arena</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
html, body {
    height: 100%;
    margin: 0;
    overflow: hidden;
}

body {
    font-family: 'Poppins', sans-serif;
    background: url("fondo.png") no-repeat center center;
    background-size: cover;
    background-attachment: fixed;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
}

/* Oscurecer imagen */
body::before {
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: -1;
}

/* Caja central */
.caja-menu {
    text-align: center;
}

.titulo-juego {
    font-family: 'Orbitron', sans-serif;
    font-weight: 800;
    font-size: 4rem;
    letter-spacing: 4px;
    text-transform: uppercase;
    text-shadow: 0 0 20px rgba(255,87,34,0.9);
    margin-bottom: 40px;
}

.glow {
    border-radius: 12px;
    font-weight: 600;
    letter-spacing: 1px;
    box-shadow: 0 0 15px rgba(255,87,34,0.6);
    transition: all 0.3s ease;
}

.glow:hover {
    transform: scale(1.08);
    box-shadow: 0 0 30px rgba(255,87,34,1);
}

@media (max-width: 768px) {
    .titulo-juego {
        font-size: 2.5rem;
    }
}
.marco-neon {
    position: relative;
    padding: 60px 50px;
    border-radius: 20px;
}

/* El borde */
.marco-neon::before {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: 20px;
    padding: 2px; /* grosor del borde */

    background: linear-gradient(
        45deg,
        #ff0080,   /* rosa */
        #ccff00,   /* limón */
        #ff0000,   /* rojo */
        #00bfff,   /* azul */
        #ff0080
    );

    background-size: 400% 400%;
    animation: neonFlow 8s linear infinite;

    /* magia → crea borde hueco */
    -webkit-mask:
        linear-gradient(#000 0 0) content-box,
        linear-gradient(#000 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;

    filter: blur(20px);
    pointer-events: none;
}

@keyframes neonFlow {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

</style>

</head>

<body>

<div class="caja-menu marco-neon">
    <h1 class="titulo-juego">Kitchen Arena</h1>

    <div class="d-grid gap-3 col-12 col-md-6 mx-auto">
        <a href="juego.html" class="btn btn-lg btn-danger glow">
            Iniciar Partida
        </a>

        <a href="configuracion.html" class="btn btn-lg btn-warning glow">
            Configuración
        </a>

        <a href="puntuaciones.html" class="btn btn-lg btn-info glow">
            Puntuaciones
        </a>
    </div>
</div>

</body>
</html>
