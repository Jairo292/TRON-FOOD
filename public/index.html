<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kitchen Arena</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link href="style.css" rel="stylesheet">
</head>

<body>

<div class="caja-menu marco-neon">
    <h1 class="titulo-juego">Kitchen Arenaa</h1>

    <div class="col-12 col-md-8 mx-auto">
        <input
            id="nombreJugador"
            type="text"
            class="form-control mb-3 input-jugador"
            placeholder="Escribe tu nombre"
            maxlength="20"
        >
    </div>

    <div class="d-grid gap-3 col-12 col-md-6 mx-auto">
        <button class="btn btn-lg btn-danger glow" onclick="iniciarJuego(1)">
            Escenario 1
        </button>

        <button class="btn btn-lg btn-warning glow" onclick="iniciarJuego(2)">
            Escenario 2
        </button>

        <button class="btn btn-lg btn-info glow" onclick="iniciarJuego(3)">
            Escenario 3
        </button>

        <a href="configuracion.html" class="btn btn-lg btn-secondary glow">
            Configuración
        </a>

        <a href="puntuaciones.html" class="btn btn-lg btn-light glow">
            Puntuaciones
        </a>
    </div>
</div>

<script src="js/script.js"></script>
</body>
</html>
