<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Puntuaciones - Kitchen Arena</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
html, body {
    height: 100%;
    margin: 0;
    overflow: hidden;
}

body {
    font-family: 'Poppins', sans-serif;
    background: url("fondo.png") no-repeat center center;
    background-size: cover;
    background-attachment: fixed;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
}

/* Oscurecer fondo */
body::before {
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.65);
    z-index: -1;
}

/* Caja principal */
.caja-puntuaciones {
    background: rgba(0,0,0,0.85);
    padding: 40px;
    border-radius: 15px;
    backdrop-filter: blur(6px);
    box-shadow: 0 0 30px rgba(0,0,0,0.6);
    width: 600px;
    max-width: 95%;
    text-align: center;
}

.titulo-seccion {
    font-family: 'Orbitron', sans-serif;
    font-weight: 700;
    letter-spacing: 3px;
    margin-bottom: 30px;
    text-transform: uppercase;
    text-shadow: 0 0 15px rgba(255,87,34,0.8);
}

/* Tabla personalizada */
.table {
    color: white;
}

.table thead {
    font-family: 'Orbitron', sans-serif;
    letter-spacing: 1px;
}

.table tbody tr {
    transition: 0.3s;
}

.table tbody tr:hover {
    background: rgba(255,87,34,0.2);
}

.btn-custom {
    border-radius: 10px;
    font-weight: 600;
    letter-spacing: 1px;
    margin-top: 20px;
}
</style>

</head>

<body>

<div class="caja-puntuaciones">

    <h2 class="titulo-seccion">Puntuaciones</h2>

    <table class="table table-dark table-hover text-center align-middle">
        <thead>
            <tr>
                <th>#</th>
                <th>Jugador</th>
                <th>Puntos</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>1</td>
                <td>ChefFuego</td>
                <td>15</td>
            </tr>
            <tr>
                <td>2</td>
                <td>LimonMaster</td>
                <td>12</td>
            </tr>
            <tr>
                <td>3</td>
                <td>ReyYogurt</td>
                <td>9</td>
            </tr>
            <tr>
                <td>4</td>
                <td>AlgodonKing</td>
                <td>7</td>
            </tr>
        </tbody>
    </table>

    <a href="index.html" class="btn btn-secondary btn-custom">
        Volver al Menú
    </a>

</div>

</body>
</html>
