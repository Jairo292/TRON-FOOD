<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Configuración - Kitchen Arena</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
html, body {
    height: 100%;
    margin: 0;
    overflow: hidden;
}

body {
    font-family: 'Poppins', sans-serif;
    background: url("fondo.png") no-repeat center center;
    background-size: cover;
    background-attachment: fixed;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
}

body::before {
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: -1;
}

.caja-menu {
    background: rgba(0,0,0,0.8);
    padding: 40px;
    border-radius: 15px;
    backdrop-filter: blur(6px);
    box-shadow: 0 0 25px rgba(0,0,0,0.6);
    width: 400px;
    position: relative;
}

.titulo-seccion {
    font-family: 'Orbitron', sans-serif;
    letter-spacing: 2px;
    text-align: center;
    margin-bottom: 30px;
}

.btn-custom {
    border-radius: 10px;
    font-weight: 600;
    letter-spacing: 1px;
}
</style>
</head>

<body>

<div class="caja-menu">

    <h2 class="titulo-seccion">⚙ Configuración</h2>

    <!-- Volumen -->
    <div class="mb-4">
        <label class="form-label">🔊 Volumen</label>
        <input type="range" class="form-range" min="0" max="100">
    </div>

    <!-- Dificultad -->
    <div class="mb-4">
        <label class="form-label">🔥 Dificultad</label>
        <select class="form-select">
            <option>Normal</option>
            <option>Experto</option>
            <option>Caos de Cocina</option>
        </select>
    </div>

    <!-- Modo de Juego -->
    <div class="mb-4">
        <label class="form-label">🎮 Modo de Juego</label>
        <select class="form-select">
            <option>1 vs 1 Local</option>
            <option>Jugador vs IA</option>
        </select>
    </div>

    <!-- Controles -->
    <div class="mb-4">
        <label class="form-label">⌨ Controles</label>
        <p class="small opacity-75">
            Jugador 1: WASD<br>
            Jugador 2: Flechas
        </p>
    </div>

    <div class="d-grid gap-2">
        <button class="btn btn-success btn-custom">Guardar</button>
        <a href="index.html" class="btn btn-secondary btn-custom">Volver</a>
    </div>

</div>

</body>
</html>
